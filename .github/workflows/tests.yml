name: CI - Testes API

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  testes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
          cache: maven

      - name: Rodar testes
        run: mvn clean test

      - name: Gerar relatório Allure
        run: mvn allure:report || true

      - name: Upload do relatório
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin