name: Run API Tests with Allure

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Rodar testes
        run: mvn clean test

      - name: Instalar Allure
        run: |
          sudo apt-add-repository ppa:qameta/allure
          sudo apt-get update
          sudo apt-get install -y allure

      - name: Gerar relatório Allure
        run: allure generate target/allure-results --clean -o allure-report

      - name: Salvar relatório como artefato
        uses: actions/upload-artifact@v3
        with:
          name: allure-report
          path: allure-report